name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: tweed-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: tweed-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: tweed-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: tweed-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: tweed-windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Compile
        run: deno compile -A --target ${{ matrix.target }} -o ${{ matrix.artifact }} main.ts

      - name: Archive (unix)
        if: runner.os != 'Windows'
        run: tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Archive (windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path "${{ matrix.artifact }}.exe" -DestinationPath "${{ matrix.artifact }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Tweed ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*
